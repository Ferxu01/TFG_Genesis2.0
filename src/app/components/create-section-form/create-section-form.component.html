<div class="mt-2 p-3 border-2 border-dashed rounded bg-gray-50">
    <div class="flex gap-3">
        <mat-form-field class="flex-1">
            <mat-select
                placeholder="Tipo de sección"
                [value]="selectedPatternId()"
                (selectionChange)="selectedPatternId.set($event.value)"
            >
                @for (pattern of availablePatterns(); track pattern.id) {
                    <mat-option [value]="pattern.id">
                        {{ pattern.name }}
                    </mat-option>
                }
            </mat-select>
        </mat-form-field>

        <button
            type="button"
            mat-icon-button
            color="primary"
            [disabled]="!selectedPatternId()"
            (click)="handleConfirmation()"
        >
            <mat-icon>check</mat-icon>
        </button>

        <button
            type="button"
            mat-icon-button
            color="warn"
            (click)="handleCancel()"
        >
            <mat-icon>close</mat-icon>
        </button>
    </div>
</div>
