<div
    class="flex items-center justify-between gap-3 px-3 py-2 bg-gray-50 border rounded-lg cursor-move"
>
    <!-- Drag handle -->
    <div class="flex items-center gap-2 text-gray-600">
        <mat-icon class="cursor-grab">drag_indicator</mat-icon>

        <span class="font-medium text-gray-800">
            {{ currentSection().pattern.name }} -
            {{ currentSection().pattern.duration | time: "long" }} -
            {{ currentSection().pattern.fType }}
        </span>
    </div>

    <!-- Actions -->
    <div class="flex gap-2">
        <button type="button" mat-icon-button (click)="edit()">
            <mat-icon>edit</mat-icon>
        </button>

        <button
            type="button"
            mat-icon-button
            class="text-red-500 hover:text-red-700"
            (click)="showConfirmModal()"
        >
            <mat-icon>delete</mat-icon>
        </button>
    </div>
</div>

@if (isConfirmationModalVisible) {
    <div
        class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
    >
        <div class="bg-white rounded-lg shadow-lg p-6 max-w-sm w-full">
            <h2 class="text-lg font-semibold text-gray-800">
                Confirmar eliminación
            </h2>
            <p class="mt-4 text-sm text-gray-600">
                ¿Estás seguro de que deseas eliminar esta sección? Esta acción
                no se puede deshacer.
            </p>
            <div class="mt-6 flex justify-end space-x-4">
                <button
                    class="px-4 py-2 text-base font-medium text-gray-600 hover:text-gray-800"
                    (click)="onCancelRemove()"
                >
                    Cancelar
                </button>
                <button
                    class="px-4 py-2 text-base font-medium text-white bg-red-500 hover:bg-red-600 rounded"
                    (click)="remove()"
                >
                    Eliminar
                </button>
            </div>
        </div>
    </div>
}
