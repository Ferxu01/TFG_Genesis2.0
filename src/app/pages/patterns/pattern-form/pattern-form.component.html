<div class="flex flex-col flex-auto min-w-0">
    <!-- Loading state -->
    @if (isLoading()) {
        <div class="flex items-center justify-center p-10">
            <div class="text-lg">Cargando datos del patrón...</div>
        </div>
    } @else {
        <div class="flex-auto p-5 sm:px-10">
            <div class="max-h-400 rounded-2xl w-3/3">
                <!-- Título dinámico -->
                <h2 class="text-2xl font-bold mb-6">
                    {{ isEditMode() ? "Editar Patrón" : "Crear Patrón" }}
                </h2>
                <form
                    class="flex flex-col px-8 py-6 pb-0 bg-card rounded-2xl shadow overflow-hidden"
                    [formGroup]="patternForm"
                    (ngSubmit)="handleFormSubmit()"
                >
                    <div class="flex gap-4 border-b mb-4">
                        <div class="flex flex-col w-1/2">
                            <!-- Nombre -->
                            <div class="flex flex-col">
                                <mat-label class="block mb-1"
                                    >Nombre del patrón</mat-label
                                >
                                <mat-form-field class="w-full">
                                    <input
                                        matInput
                                        formControlName="name"
                                        class="p-0"
                                        placeholder="Introduce un nombre descriptivo para el patrón"
                                    />
                                </mat-form-field>
                            </div>
                        </div>
                        <div class="flex w-1/2">
                            <!-- Tipo de Función -->
                            <div class="flex flex-col w-1/2 mr-2">
                                <mat-label class="block mb-1"
                                    >Tipo de Función</mat-label
                                >
                                <mat-form-field class="w-full">
                                    <mat-select
                                        formControlName="fType"
                                        (selectionChange)="(null)"
                                    >
                                        <mat-option value="linear">
                                            Lineal
                                        </mat-option>
                                        <mat-option value="curve">
                                            Curva
                                        </mat-option>
                                        <mat-option value="parabolic">
                                            Parábola
                                        </mat-option>
                                    </mat-select>
                                </mat-form-field>
                            </div>

                            <div class="flex flex-col w-1/2">
                                <mat-label class="block mb-1">
                                    Duración (segundos)
                                </mat-label>
                                <mat-form-field [ngClass]="''" class="w-full">
                                    <input
                                        matInput
                                        type="number"
                                        formControlName="duration"
                                        placeholder="Ej: 1 hora = 3600 seg"
                                        min="0"
                                    />
                                </mat-form-field>
                            </div>
                        </div>
                    </div>

                    <div class="flex">
                        <div class="flex flex-col w-1/2 mr-4">
                            <mat-label class="block mb-1">
                                Rango de valores en los que generar
                            </mat-label>
                            <!-- Contenedor de los campos Mínimo y Máximo -->
                            <div class="flex">
                                <!-- Campo Mínimo -->
                                <div class="w-1/2 mr-2">
                                    <mat-form-field
                                        [ngClass]="''"
                                        class="w-full"
                                    >
                                        <input
                                            matInput
                                            type="number"
                                            formControlName="initValue"
                                            placeholder="Mín"
                                            min="0"
                                        />
                                    </mat-form-field>
                                </div>
                                <!-- Campo Máximo -->
                                <div class="w-1/2">
                                    <mat-form-field
                                        [ngClass]="''"
                                        class="w-full"
                                    >
                                        <input
                                            matInput
                                            type="number"
                                            formControlName="endValue"
                                            placeholder="Máx"
                                            min="0"
                                        />
                                    </mat-form-field>
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col w-1/2">
                            <mat-label class="block mb-1">
                                Tolerancia mínima y máxima
                            </mat-label>
                            <!-- Contenedor de los campos Mínimo y Máximo -->
                            <div class="flex">
                                <!-- Campo Mínimo -->
                                <div class="w-1/2 mr-2">
                                    <mat-form-field
                                        [ngClass]="''"
                                        class="w-full"
                                    >
                                        <input
                                            matInput
                                            type="number"
                                            formControlName="minTolerance"
                                            placeholder="Mín"
                                            min="0"
                                        />
                                    </mat-form-field>
                                </div>
                                <!-- Campo Máximo -->
                                <div class="w-1/2">
                                    <mat-form-field
                                        [ngClass]="''"
                                        class="w-full"
                                    >
                                        <input
                                            matInput
                                            type="number"
                                            formControlName="maxTolerance"
                                            placeholder="Máx"
                                            min="0"
                                        />
                                    </mat-form-field>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Botones de acción -->
                    <div
                        class="flex items-center justify-end border-t -mx-8 mt-4 px-8 py-5 bg-gray-50 dark:bg-gray-700 rounded-b-lg"
                    >
                        <button
                            mat-button
                            type="button"
                            (click)="navigateToPatternsList()"
                        >
                            Cancelar
                        </button>
                        <button
                            class="px-6 ml-3 text-white"
                            mat-flat-button
                            color="primary"
                            [disabled]="isSubmitting() || patternForm.invalid"
                            type="submit"
                        >
                            @if (isSubmitting()) {
                                {{
                                    isEditMode() ? "Editando..." : "Creando..."
                                }}
                            } @else {
                                {{
                                    isEditMode()
                                        ? "Editar Patrón"
                                        : "Crear Patrón"
                                }}
                            }
                        </button>
                    </div>
                </form>
            </div>
        </div>
    }
</div>
