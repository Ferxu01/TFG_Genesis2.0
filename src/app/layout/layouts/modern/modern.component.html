<!-- Loading bar -->
<fuse-loading-bar></fuse-loading-bar>

<!-- Navigation -->
@if (isScreenSmall) {
    <fuse-vertical-navigation
        class="dark bg-gray-900 print:hidden"
        [mode]="'over'"
        [name]="'mainNavigation'"
        [opened]="false"
    >
        <!-- Navigation header hook -->
        <ng-container fuseVerticalNavigationContentHeader>
            <!-- Logo -->
            <div class="flex items-center h-20 pt-6 px-8">
                <img
                    class="w-20"
                    src="assets/images/GENESIS/ICONO/96X96/96 96.png"
                    alt="Logo image"
                />
            </div>
        </ng-container>
    </fuse-vertical-navigation>
}

<!-- Wrapper -->
<div class="flex flex-col flex-auto w-full min-w-0 min-h-screen">
    <!-- Añadido min-h-screen -->

    <!-- Header -->
    <div
        class="relative flex flex-0 items-center w-full h-16 sm:h-18 px-4 md:px-12 z-49 shadow dark:shadow-none dark:border-b bg-card dark:bg-transparent print:hidden"
    >
        @if (!isScreenSmall) {
            <div class="flex items-center mx-2 lg:mr-8">
                <div class="hidden lg:flex">
                    <img
                        class="dark:hidden w-9"
                        src="assets/images/GENESIS/ICONO/96X96/96 96.png"
                    />
                </div>
                <img
                    class="flex lg:hidden w-7"
                    src="assets/images/GENESIS/ICONO/96X96/96 96.png"
                />
            </div>

            <fuse-horizontal-navigation
                class="mr-4"
                [name]="'mainNavigation'"
                [navigation]="navigationItems"
            ></fuse-horizontal-navigation>
        }
    </div>

    <!-- Content -->
    <div class="flex flex-col flex-auto w-full overflow-auto">
        <router-outlet />
    </div>

    <!-- Footer -->
    <div
        class="relative flex flex-0 items-center w-full h-14 sm:h-20 px-4 md:px-6 z-49 border-t bg-card dark:bg-transparent print:hidden"
    >
        <span class="font-medium text-secondary"
            >Genesis 2.0 &copy; {{ currentYear }}</span
        >
    </div>
</div>
